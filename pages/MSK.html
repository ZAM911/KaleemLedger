e": {"Observation": "Muscle wasting (supraspinatus/infraspinatus fossae), scapular position, swelling, deformity.", "Posture": "Scapular protraction/winging, thoracic kyphosis contributing to impingement.", "Gait analysis": "Not typically relevant.", "Palpation": "Subacromial space, AC joint, bicipital groove, greater tuberosity.", "Active ROM": "Flexion, abduction, internal/external rotation, painful arc (60-120\u00b0).", "Passive ROM": "Compare active vs passive \u2014 capsulitis shows equal restriction (esp. ER).", "Overpressure": "Gentle once acute irritability ruled out.", "Resisted testing": "Resisted abduction (supraspinatus), ER (infraspinatus), IR (subscapularis), Speed's (biceps).", "Strength testing": "Manual testing rotator cuff/scapular stabilisers \u2014 pain vs true weakness.", "Manual muscle testing": "Supraspinatus (empty/full can), infraspinatus/teres minor (ER at 0\u00b0), subscapularis (belly-press/lift-off).", "Neurological examination": "C5-C6 screen if cervical referral suspected.", "Dermatomes": "C5 lateral arm/deltoid for cervical differential.", "Myotomes": "C5 shoulder abduction \u2014 differentiate cervical radiculopathy from local weakness.", "Reflexes": "Biceps reflex (C5/6) if cervical involvement suspected.", "Functional assessment": "Hand behind back, overhead reach, dressing.", "Special tests": "Neer's/Hawkins-Kennedy (impingement), empty can/Jobe's (supraspinatus), ER lag sign (infraspinatus tear), lift-off/belly-press (subscapularis), apprehension/relocation (instability), sulcus sign, O'Brien's (labral/SLAP), Speed's/Yergason's (biceps), scarf test (AC joint).", "Joint mobility assessment": "GH accessory glides (anterior/posterior/inferior).", "Accessory movements": "AC/SC joint mobility, GH distraction/compression.", "Outcome measures": "Oxford Shoulder Score, DASH, SPADI, Constant-Murley Score."}, "reasoning": {"Likely diagnosis": "Subacromial pain syndrome/rotator cuff tendinopathy, adhesive capsulitis, AC pathology, instability.", "Differential diagnosis": "Cervical radiculopathy, referred cardiac pain (rare), rotator cuff tear, calcific tendinopathy.", "Clinical decision making": "Impingement test cluster + painful arc + resisted weakness raises suspicion of cuff tear; equal active/passive global restriction suggests capsulitis.", "Referral criteria": "Suspected full-thickness tear in active/young patient, acute traumatic dislocation, red flags, failure to progress.", "When imaging is indicated": "Suspected significant tear for surgery, trauma with fracture/dislocation, failure of 6-12 weeks conservative management."}, "treatment": {"Short-term goals": "Reduce pain, restore functional ROM, reduce night pain.", "Long-term goals": "Restore full strength/ROM, return to overhead work/sport, prevent recurrence.", "Patient education": "Explain tendinopathy/impingement mechanism, reassurance re: favourable natural history.", "Pain management": "Relative rest from aggravating overhead activity, analgesia as needed.", "Manual therapy": "GH mobilisation, thoracic mobilisation (improves scapular mechanics), soft tissue work.", "Soft tissue techniques": "Pec minor, upper trapezius release.", "Joint mobilisations": "Graded GH mobilisation, esp. capsulitis (posterior/inferior glides).", "Exercise prescription": "Progressive rotator cuff/scapular strengthening (well-evidenced first-line).", "Strengthening": "Isometric-to-isotonic cuff strengthening, scapular stabiliser strengthening.", "Stretching": "Posterior capsule, pec minor stretching.", "Motor control": "Scapular setting/control during arm elevation.", "Balance training": "Closed-chain shoulder stability work in later rehab.", "Functional rehabilitation": "Graded return to overhead tasks, lifting retraining.", "Sport-specific rehabilitation": "Throwing progression programmes, sport-specific loading.", "Return-to-work criteria": "Pain-free/functional strength for overhead/lifting demands.", "Return-to-sport criteria": "Full strength symmetry, pain-free sport-specific patterns, completed throwing/overhead progression.", "Home exercise programme": "Daily rotator cuff/scapular strengthening, posterior capsule stretching.", "Progression criteria": "Reduced pain on resisted testing, improved ROM/outcome scores.", "Discharge criteria": "Functional goals achieved, strength symmetry restored."}, "pearls": {"Common mistakes": "Relying on single special tests; missing cervical spine source; excessive rest rather than graded loading.", "Key examination tips": "Compare active vs passive ROM to differentiate capsulitis from impingement; assess scapular control.", "Important clinical signs": "ER lag sign strongly indicates infraspinatus tear; positive apprehension+relocation suggests true instability.", "Evidence-based recommendations": "Structured exercise as effective as surgery for many rotator cuff-related pain presentations."}}, "Elbow": {"anatomy": {"Bones": "Humerus, radius, ulna.", "Joints": "Humeroulnar, humeroradial, proximal radioulnar (pronation/supination).", "Ligaments": "Ulnar (medial) collateral ligament, radial (lateral) collateral ligament, annular ligament.", "Capsule": "Single fibrous capsule enclosing all three articulations.", "Muscles": "Biceps/triceps/brachialis, common extensor origin (lateral epicondyle), common flexor origin (medial epicondyle), pronator teres/supinator.", "Tendons": "Common extensor tendon (tennis elbow), common flexor tendon (golfer's elbow), distal biceps/triceps tendon.", "Bursae": "Olecranon bursa \u2014 bursitis site.", "Blood supply": "Brachial artery bifurcates near elbow into radial/ulnar arteries.", "Nerve supply": "Ulnar nerve (cubital tunnel), median nerve (anterior), radial nerve (posterolateral).", "Biomechanics": "Hinge for flexion/extension (0-150\u00b0) plus radioulnar rotation (~75-85\u00b0 each direction)."}, "pathology": {"Degenerative": "OA (less common, often post-traumatic).", "Traumatic": "Radial head fracture, olecranon fracture, dislocation, distal biceps/triceps rupture.", "Inflammatory": "Olecranon bursitis, rheumatoid arthritis.", "Neurological": "Cubital tunnel syndrome, radial tunnel syndrome.", "Sports": "Lateral epicondylalgia, medial epicondylalgia, UCL injury (throwers), triceps tendinopathy.", "Post-operative": "ORIF fixation, UCL reconstruction, ulnar nerve decompression/transposition."}, "subjective": {"Presenting symptoms": "Lateral/medial elbow pain, grip weakness, numbness/tingling into hand, locking/catching.", "Pain characteristics": "Lateral pain with gripping/wrist extension; medial pain with gripping/wrist flexion or throwing.", "Mechanism of injury": "Repetitive gripping/extension, throwing (valgus overload), FOOSH.", "History taking": "Occupation/sport demands, onset pattern, previous injury.", "Functional limitations": "Gripping, carrying, twisting, lifting with elbow extended.", "Occupational considerations": "Repetitive gripping/typing, tools/vibration trades.", "Sport-specific considerations": "Racquet sports (lateral), throwing sports (medial/UCL), golf (medial).", "Red flags": "Septic bursitis/joint infection signs, suspected fracture/dislocation, progressive neuro deficit.", "Yellow flags": "Occupational stress from repetitive tasks, fear of re-injury.", "Differential diagnosis questions": "Cervical/shoulder referral vs local pathology; nerve entrapment vs tendinopathy pattern."}, "objective": {"Observation": "Swelling (olecranon bursa), deformity, carrying angle.", "Posture": "Resting elbow position, compensatory shoulder/wrist positioning.", "Gait analysis": "Not relevant.", "Palpation": "Lateral/medial epicondyle, olecranon, radial head, cubital tunnel.", "Active ROM": "Flexion, extension, pronation, supination.", "Passive ROM": "Compare to active; assess end-feel.", "Overpressure": "Gentle once trauma ruled out.", "Resisted testing": "Resisted wrist extension (lateral epicondylalgia), resisted flexion/pronation (medial epicondylalgia).", "Strength testing": "Grip strength (dynamometer), flexor/extensor strength.", "Manual muscle testing": "Biceps, triceps, wrist flexors/extensors, pronator/supinator.", "Neurological examination": "Ulnar nerve screen (Tinel's cubital tunnel), median/radial as indicated.", "Dermatomes": "C6-C8 for cervical referral differential.", "Myotomes": "C6 elbow flexion/wrist extension, C7 elbow extension/wrist flexion \u2014 cervical screen.", "Reflexes": "Biceps (C5/6), triceps (C7).", "Functional assessment": "Grip/carry tasks, jar opening, push-up tolerance.", "Special tests": "Cozen's/Mill's (lateral epicondylalgia), golfer's elbow test, varus/valgus stress test, Tinel's at cubital tunnel, moving valgus stress test (UCL).", "Joint mobility assessment": "Humeroulnar/humeroradial and radioulnar accessory glides.", "Accessory movements": "Radial head AP/PA glide, humeroulnar distraction.", "Outcome measures": "PRTEE, DASH, grip dynamometry."}, "reasoning": {"Likely diagnosis": "Lateral epicondylalgia (most common), medial epicondylalgia, olecranon bursitis, cubital tunnel syndrome.", "Differential diagnosis": "Cervical radiculopathy (C6/C7), radial tunnel syndrome, UCL injury, elbow OA/loose body.", "Clinical decision making": "Reproducible pain with resisted wrist extension + lateral epicondyle tenderness supports tendinopathy; ulnar paraesthesia + positive Tinel's suggests cubital tunnel.", "Referral criteria": "Suspected UCL rupture, failure of conservative management 3-6 months, progressive nerve compression signs.", "When imaging is indicated": "Suspected fracture/dislocation, UCL tear for surgery, atypical/refractory presentations."}, "treatment": {"Short-term goals": "Reduce pain with gripping, begin graded loading.", "Long-term goals": "Restore full grip strength, return to demands without recurrence.", "Patient education": "Tendinopathy as loading/capacity issue, favourable prognosis over months.", "Pain management": "Activity modification, counterforce strap adjunct.", "Manual therapy": "Elbow/wrist mobilisation, soft tissue techniques.", "Soft tissue techniques": "Deep friction/soft tissue release to common extensor/flexor origin (adjunctive).", "Joint mobilisations": "Radiohumeral/radioulnar mobilisation if restricted.", "Exercise prescription": "Progressive tendon loading \u2014 isometric to eccentric/heavy slow resistance.", "Strengthening": "Wrist extensor/flexor, grip, forearm/shoulder girdle strength.", "Stretching": "Wrist flexor/extensor stretches (adjunct).", "Motor control": "Grip/forearm control retraining for occupational tasks.", "Balance training": "Not typically relevant.", "Functional rehabilitation": "Task-specific grip/lift retraining, ergonomic advice.", "Sport-specific rehabilitation": "Graded return to racquet/throwing with technique review.", "Return-to-work criteria": "Pain-free grip/lift matching job demands.", "Return-to-sport criteria": "Full strength, pain-free sport-specific loading.", "Home exercise programme": "Daily progressive loading, grip strengthening.", "Progression criteria": "Reduced pain on resisted testing, improved grip/PRTEE.", "Discharge criteria": "Functional/strength goals met, loading plan established."}, "pearls": {"Common mistakes": "Treating epicondylalgia as purely inflammatory; missing cervical differential.", "Key examination tips": "Bilateral grip strength; resisted wrist extension/flexion as key provocation tests.", "Important clinical signs": "Positive Tinel's at cubital tunnel with ulnar paraesthesia suggests entrapment, not tendinopathy.", "Evidence-based recommendations": "Eccentric/heavy-slow-resistance loading has strong evidence over passive modalities alone."}}, "Wrist and Hand": {"anatomy": {"Bones": "Radius, ulna, 8 carpal bones, 5 metacarpals, 14 phalanges.", "Joints": "Radiocarpal, midcarpal, CMC (thumb CMC especially relevant), MCP, PIP/DIP.", "Ligaments": "Scapholunate ligament, TFCC, volar/dorsal radiocarpal ligaments, digit collateral ligaments.", "Capsule": "Multiple small joint capsules; TFCC also load-bearing on ulnar side.", "Muscles": "Extrinsic wrist/finger flexors/extensors, intrinsic hand muscles (thenar, hypothenar, lumbricals, interossei).", "Tendons": "FCR/FCU, ECR/ECU, FDS/FDP, extensor tendons (De Quervain's = 1st compartment).", "Bursae": "Not prominent; tendon sheaths more clinically relevant (tenosynovitis).", "Blood supply": "Radial/ulnar arteries forming palmar arches; scaphoid has vulnerable retrograde supply.", "Nerve supply": "Median (carpal tunnel), ulnar (Guyon's canal), radial (dorsal sensory).", "Biomechanics": "Wrist flex/ext, radial/ulnar deviation; thumb CMC allows opposition critical for grip/pinch."}, "pathology": {"Degenerative": "Thumb CMC OA (very common), wrist OA (often post-traumatic).", "Traumatic": "Scaphoid fracture (FOOSH, AVN risk), distal radius fracture, TFCC tear, scapholunate injury.", "Inflammatory": "Rheumatoid arthritis, De Quervain's tenosynovitis.", "Neurological": "Carpal tunnel syndrome, ulnar nerve entrapment at Guyon's canal.", "Sports": "Gymnast's wrist, TFCC tear, skier's thumb (UCL of thumb MCP).", "Post-operative": "Carpal tunnel release, TFCC repair, scaphoid ORIF, Dupuytren's fasciectomy."}, "subjective": {"Presenting symptoms": "Wrist/hand pain, numbness/tingling, weakness, swelling, triggering.", "Pain characteristics": "Radial-sided with thumb use (De Quervain's/CMC OA), ulnar-sided with load/rotation (TFCC), night numbness (carpal tunnel).", "Mechanism of injury": "FOOSH, repetitive gripping/typing, forced thumb abduction.", "History taking": "Hand dominance, occupational/hobby repetitive demands, prior fractures.", "Functional limitations": "Fine motor tasks, gripping, typing, weight-bearing through wrist.", "Occupational considerations": "Repetitive keyboard/mouse use, vibration tools.", "Sport-specific considerations": "Weight-bearing sports (gymnastics), racquet sports (TFCC), climbing (pulley injuries).", "Red flags": "Suspected scaphoid fracture (snuffbox tenderness post-FOOSH \u2014 AVN risk), flexor tenosynovitis/infection signs, compartment syndrome signs.", "Yellow flags": "Occupational stress, anxiety re: hand function affecting work/hobbies.", "Differential diagnosis questions": "Numbness distribution (median vs ulnar vs whole hand \u2014 consider cervical origin); tendon-specific vs joint-specific loading pain."}, "objective": {"Observation": "Swelling, deformity (Boutonniere/swan neck in RA), thenar wasting (carpal tunnel).", "Posture": "Resting hand posture, digit alignment.", "Gait analysis": "Not relevant.", "Palpation": "Anatomical snuffbox, CMC joint, TFCC region, carpal tunnel, tendon sheaths.", "Active ROM": "Wrist flexion/extension, radial/ulnar deviation, pronation/supination, digit flex/extension.", "Passive ROM": "Compare to active; note joint-specific restriction.", "Overpressure": "Careful once fracture excluded.", "Resisted testing": "Resisted thumb extension/abduction (De Quervain's), resisted grip.", "Strength testing": "Grip and pinch strength (dynamometer/pinch gauge).", "Manual muscle testing": "Wrist flexors/extensors, intrinsic hand muscles.", "Neurological examination": "Median (thumb-middle finger, radial ring), ulnar (little finger, ulnar ring), radial (dorsal web space).", "Dermatomes": "C6-C8 for cervical referral differential.", "Myotomes": "C8 finger flexion, T1 finger abduction \u2014 cervical screen.", "Reflexes": "Not routinely tested at this level.", "Functional assessment": "Grip/pinch tasks, buttoning, writing, wrist weight-bearing.", "Special tests": "Finkelstein's (De Quervain's), Phalen's/Tinel's (carpal tunnel), Watson's scaphoid shift, TFCC load/grind test, UCL stress test of thumb, grind test (CMC OA).", "Joint mobility assessment": "Radiocarpal/midcarpal accessory glides.", "Accessory movements": "CMC mobility, intercarpal glides.", "Outcome measures": "DASH/QuickDASH, PRWE, grip strength dynamometry."}, "reasoning": {"Likely diagnosis": "De Quervain's tenosynovitis, carpal tunnel syndrome, thumb CMC OA, TFCC injury, wrist sprain.", "Differential diagnosis": "Scaphoid fracture, cervical radiculopathy (C6-C8), early RA, Guyon's canal entrapment.", "Clinical decision making": "Positive Finkelstein's + radial pain with thumb use = De Quervain's; nocturnal median-distribution numbness + Phalen's/Tinel's = carpal tunnel; snuffbox tenderness post-trauma = treat as scaphoid fracture until imaging excludes.", "Referral criteria": "Suspected scaphoid fracture, suspected flexor tenosynovitis/infection, progressive neuro deficit, failed conservative carpal tunnel management.", "When imaging is indicated": "Suspected fracture (scaphoid views), persistent carpal tunnel for surgical consideration, suspected ligament injury not responding to conservative care."}, "treatment": {"Short-term goals": "Reduce pain with functional tasks, protect healing structures.", "Long-term goals": "Restore full grip/pinch strength, fine motor function, return to demands.", "Patient education": "Ergonomic modification advice, splinting rationale, realistic recovery timeframes.", "Pain management": "Splinting (thumb spica, night wrist splint for carpal tunnel), activity modification.", "Manual therapy": "Wrist/carpal mobilisation, soft tissue work to forearm.", "Soft tissue techniques": "Tendon gliding exercises, myofascial release.", "Joint mobilisations": "Radiocarpal/midcarpal mobilisation, CMC mobilisation for early OA.", "Exercise prescription": "Progressive tendon loading, nerve gliding exercises, grip strengthening.", "Strengthening": "Grip/pinch, wrist flexor/extensor, intrinsic hand muscle strengthening.", "Stretching": "Wrist flexor/extensor stretches, thumb mobility exercises.", "Motor control": "Fine motor retraining post-injury/surgery.", "Balance training": "Not relevant.", "Functional rehabilitation": "Graded return to gripping/lifting/fine motor tasks.", "Sport-specific rehabilitation": "Graded return to weight-bearing or racquet loading.", "Return-to-work criteria": "Pain-free functional grip/pinch/dexterity.", "Return-to-sport criteria": "Full strength, pain-free sport-specific wrist loading.", "Home exercise programme": "Daily tendon gliding, grip strengthening, splint-wear compliance.", "Progression criteria": "Reduced pain on provocation tests, improved grip/DASH/PRWE.", "Discharge criteria": "Functional goals met, self-management established."}, "pearls": {"Common mistakes": "Missing scaphoid fracture with snuffbox tenderness; under-treating carpal tunnel red flags.", "Key examination tips": "Test median/ulnar distributions separately; assess thumb CMC specifically in older adults.", "Important clinical signs": "Thenar wasting indicates advanced/chronic median compression.", "Evidence-based recommendations": "Night splinting effective first-line for mild-moderate carpal tunnel; surgery reserved for severe/refractory cases."}}, "Hip": {"anatomy": {"Bones": "Femur (head, neck, trochanters), acetabulum.", "Joints": "Hip joint (deep, stable ball-and-socket).", "Ligaments": "Iliofemoral, pubofemoral, ischiofemoral, ligamentum teres.", "Capsule": "Strong fibrous capsule reinforced by ligaments \u2014 significant stability contribution.", "Muscles": "Gluteus max/med/min, iliopsoas, adductors, hamstrings, deep external rotators, quadriceps.", "Tendons": "Gluteal tendons (GTPS), iliopsoas tendon, hamstring origin, adductor tendons at pubic symphysis.", "Bursae": "Trochanteric, iliopsoas, ischial bursae.", "Blood supply": "Medial/lateral circumflex femoral arteries; retinacular vessels supply femoral head (AVN risk).", "Nerve supply": "Femoral (anterior), obturator (medial), sciatic (posterior).", "Biomechanics": "Deep ball-and-socket for stability; labrum increases contact area; large forces cross joint during gait (~3x bodyweight)."}, "pathology": {"Degenerative": "Hip OA (groin pain, reduced IR classic), labral degeneration.", "Traumatic": "NOF fracture (elderly, high morbidity), hip dislocation, traumatic labral tear.", "Inflammatory": "Inflammatory arthropathy, septic arthritis (paediatric \u2014 irritable hip differential), transient synovitis.", "Neurological": "Meralgia paraesthetica, sciatic referral (piriformis syndrome).", "Sports": "Femoroacetabular impingement (FAI), labral tears, adductor-related groin pain, hip flexor strain, gluteal tendinopathy.", "Post-operative": "Total hip replacement (approach-specific precautions), hip arthroscopy for FAI/labral repair."}, "subjective": {"Presenting symptoms": "Groin pain (intra-articular), lateral hip pain (GTPS), buttock pain (deep gluteal/piriformis/referred lumbar).", "Pain characteristics": "C-sign (cupping hand over trochanter/groin) classic for intra-articular pathology; lateral pain worse side-lying (GTPS).", "Mechanism of injury": "Insidious (OA, FAI), fall (NOF fracture elderly), sudden twisting/kicking (adductor/labral injury).", "History taking": "Age (young=FAI/labral/sports; elderly=OA/fracture), childhood hip conditions (DDH, Perthes', SUFE).", "Functional limitations": "Shoes/socks, car transfers, prolonged sitting, walking distance, stairs.", "Occupational considerations": "Prolonged standing/walking, squatting/kneeling.", "Sport-specific considerations": "Kicking sports (adductor strain), repetitive hip flexion sports (FAI symptoms).", "Red flags": "Fall + inability to weight-bear in elderly (NOF fracture until excluded), fever/hot joint in child (septic arthritis \u2014 urgent), unexplained weight loss/night pain (malignancy).", "Yellow flags": "Fear of falling limiting activity in older adults, fear-avoidance in athletes post-injury.", "Differential diagnosis questions": "Groin pain \u2014 hip joint vs hernia vs adductor vs lumbar referral; lateral hip pain \u2014 GTPS vs lumbar radiculopathy vs true hip OA."}, "objective": {"Observation": "Antalgic gait, leg length discrepancy, gluteal wasting, Trendelenburg pattern.", "Posture": "Pelvic tilt, lumbar lordosis compensations.", "Gait analysis": "Trendelenburg sign/gait, antalgic pattern, reduced stride length.", "Palpation": "Greater trochanter, ischial tuberosity, adductor origin, anterior joint line (deep, less accessible).", "Active ROM": "Flexion, extension, abduction, adduction, internal/external rotation.", "Passive ROM": "Internal rotation loss often earliest/most sensitive sign of hip joint pathology.", "Overpressure": "Gentle once fracture/acute trauma excluded.", "Resisted testing": "Resisted flexion (iliopsoas/rectus femoris), abduction (gluteus medius \u2014 GTPS), adduction (adductor strain).", "Strength testing": "Gluteal strength, hip flexor/adductor strength, single-leg stance control.", "Manual muscle testing": "Hip flexors, extensors, abductors, adductors, rotators.", "Neurological examination": "L1-S1 screen if lumbar referral suspected.", "Dermatomes": "L1 groin, L2/3 anterior thigh \u2014 lumbar referral differential.", "Myotomes": "L2 hip flexion, L3 knee extension (screen lumbar source).", "Reflexes": "Patellar (L3/4) if lumbar source suspected.", "Functional assessment": "Single-leg stance (30s), sit-to-stand, step-up/down, squat depth/quality.", "Special tests": "FADIR (FAI/labral), FABER/Patrick's (hip/SIJ), Trendelenburg test, Thomas test (hip flexor tightness), Ober's test (ITB), resisted SLR (labral), log roll test (intra-articular).", "Joint mobility assessment": "Hip accessory glides (distraction, AP/PA) \u2014 limited due to deep joint.", "Accessory movements": "Long-axis distraction for capsular restriction.", "Outcome measures": "HOOS, Harris Hip Score, Oxford Hip Score."}, "reasoning": {"Likely diagnosis": "Hip OA (older, groin pain + reduced IR), GTPS (lateral hip pain), FAI/labral pathology (younger, active), adductor-related groin pain.", "Differential diagnosis": "NOF fracture (elderly fall), lumbar referral, inguinal hernia, septic arthritis (esp. paediatric), AVN of femoral head.", "Clinical decision making": "Reduced passive IR + groin pain + age >50 suggests OA; positive FADIR + younger active patient suggests FAI/labral; lateral pain worse lying + positive resisted abduction suggests GTPS.", "Referral criteria": "Suspected fracture/dislocation, suspected septic arthritis (urgent), failed conservative OA management, suspected labral tear significantly limiting sport.", "When imaging is indicated": "Suspected fracture (XR), OA for surgical planning, FAI/labral tear for arthroscopy, red flags present."}, "treatment": {"Short-term goals": "Reduce pain with weight-bearing/functional tasks.", "Long-term goals": "Restore strength/function, delay/avoid surgery where appropriate.", "Patient education": "OA education (activity beneficial, not harmful), weight management, realistic GTPS timelines.", "Pain management": "Avoid provocative positions (e.g. side-lying on affected hip for GTPS), analgesia per guidance.", "Manual therapy": "Hip joint mobilisation (distraction esp. for OA stiffness), soft tissue work.", "Soft tissue techniques": "ITB/TFL release, gluteal soft tissue work for GTPS.", "Joint mobilisations": "Long-axis distraction, AP/PA glides for capsular restriction.", "Exercise prescription": "Progressive strengthening \u2014 strong evidence for OA and GTPS.", "Strengthening": "Gluteus medius/maximus, hip abductor/extensor, adductor strengthening (Copenhagen protocol).", "Stretching": "Hip flexor, ITB, adductor stretching as indicated.", "Motor control": "Single-leg control/gluteal activation retraining, addressing Trendelenburg pattern.", "Balance training": "Single-leg balance progression, esp. post-fracture/surgery.", "Functional rehabilitation": "Sit-to-stand, stair, gait retraining.", "Sport-specific rehabilitation": "Graded return to kicking/cutting/pivoting, FAI-specific loading.", "Return-to-work criteria": "Functional tolerance to job-specific demands.", "Return-to-sport criteria": "Full strength symmetry, pain-free sport-specific movements.", "Home exercise programme": "Daily gluteal/hip strengthening, activity pacing advice.", "Progression criteria": "Improved HOOS/Oxford Hip Score, improved strength, reduced functional pain.", "Discharge criteria": "Functional goals achieved, strength restored, self-management or surgical pathway agreed."}, "pearls": {"Common mistakes": "Missing NOF fracture in elderly faller who can still weight-bear a little; attributing lateral hip pain purely to 'bursitis'; under-dosing strengthening for OA due to fear of joint 'wear'.", "Key examination tips": "Passive internal rotation \u2014 one of most sensitive tests for intra-articular hip pathology.", "Important clinical signs": "Positive log roll test (pain with passive rotation, no muscle involvement) suggests true intra-articular pathology.", "Evidence-based recommendations": "Exercise therapy first-line for hip OA and GTPS, with outcomes comparable/superior to corticosteroid injection at longer follow-up."}}, "Knee": {"anatomy": {"Bones": "Femur, tibia, patella, fibula (proximal tibiofibular joint).", "Joints": "Tibiofemoral (medial/lateral compartments), patellofemoral, proximal tibiofibular.", "Ligaments": "ACL, PCL, MCL, LCL \u2014 key stabilisers; menisci (medial/lateral) for load distribution/shock absorption.", "Capsule": "Fibrous capsule with synovial lining; large synovial cavity, effusion common with injury.", "Muscles": "Quadriceps (esp. VMO for patellar tracking), hamstrings, gastrocnemius, popliteus, ITB/TFL.", "Tendons": "Patellar tendon, quadriceps tendon, hamstring tendons (pes anserinus), ITB insertion.", "Bursae": "Prepatellar, infrapatellar, pes anserine bursae.", "Blood supply": "Genicular arteries (branches of femoral/popliteal artery) forming peripatellar anastomosis.", "Nerve supply": "Femoral nerve (anterior/quads), tibial and common peroneal nerves (posterior/lateral via sciatic).", "Biomechanics": "Hinge joint with rotation component; screw-home mechanism in terminal extension; patella acts as lever arm for quadriceps."}, "pathology": {"Degenerative": "Knee OA (esp. medial compartment), meniscal degeneration.", "Traumatic": "ACL/PCL/MCL/LCL rupture, meniscal tear, patella fracture/dislocation, tibial plateau fracture.", "Inflammatory": "Rheumatoid arthritis, gout/pseudogout (acute hot swollen knee).", "Neurological": "Common peroneal nerve injury (foot drop risk post-trauma/surgery).", "Sports": "ACL tear (pivoting sports), patellofemoral pain syndrome, patellar tendinopathy (jumper's knee), ITB syndrome, meniscal tear (twisting injury).", "Post-operative": "Total knee replacement, ACL reconstruction, meniscal repair/meniscectomy."}, "subjective": {"Presenting symptoms": "Knee pain, swelling, instability/giving way, locking/catching, difficulty with stairs/squatting.", "Pain characteristics": "Anterior knee pain (patellofemoral), medial/lateral joint line pain (meniscal/collateral ligament), diffuse ache (OA).", "Mechanism of injury": "Pivoting/twisting (ACL/meniscus), valgus force (MCL), direct blow/dashboard injury (PCL), FOOSH/hyperextension.", "History taking": "Audible pop at time of injury (suggests ACL), immediate vs delayed swelling, mechanism details.", "Functional limitations": "Stairs (esp. descending), squatting, kneeling, prolonged sitting (theatre sign \u2014 patellofemoral), running/cutting sports.", "Occupational considerations": "Kneeling/squatting demands, prolonged standing/walking.", "Sport-specific considerations": "Pivoting/cutting sports (ACL risk), running (patellofemoral/ITB), jumping sports (patellar tendinopathy).", "Red flags": "Locked knee unable to fully extend (suspected meniscal tear/loose body), hot swollen joint with fever (septic arthritis), significant trauma with suspected fracture, inability to weight-bear post-trauma (Ottawa Knee Rules).", "Yellow flags": "Fear of instability/giving way limiting activity, fear-avoidance post-ACL injury.", "Differential diagnosis questions": "True instability (structural) vs pain-inhibited giving way; mechanical locking (meniscal/loose body) vs stiffness-related limitation."}, "objective": {"Observation": "Effusion, quadriceps wasting (esp. VMO), alignment (genu varum/valgum), patella position.", "Posture": "Standing alignment, static Q-angle assessment.", "Gait analysis": "Antalgic pattern, quadriceps avoidance gait, varus/valgus thrust.", "Palpation": "Joint line (medial/lateral), patellar facets, pes anserine, popliteal fossa.", "Active ROM": "Flexion, extension \u2014 note any extension lag or flexion block.", "Passive ROM": "Compare to active; assess end-feel (effusion = boggy, mechanical block = firm).", "Overpressure": "Gentle if no acute severe swelling/suspected fracture.", "Resisted testing": "Resisted knee extension (quads), resisted flexion (hamstrings).", "Strength testing": "Quadriceps and hamstring strength, single-leg squat/hop testing (later stage).", "Manual muscle testing": "Quadriceps, hamstrings, hip abductors (influence knee mechanics).", "Neurological examination": "L3-S2 screen if referred symptoms; common peroneal nerve screen post-trauma/surgery.", "Dermatomes": "L3 anterior knee, L4 medial shin \u2014 lumbar referral differential.", "Myotomes": "L3 knee extension, L4 ankle dorsiflexion (lumbar screen).", "Reflexes": "Patellar reflex (L3/4).", "Functional assessment": "Single-leg squat, step-down test, hop tests (later stage rehab), stair negotiation.", "Special tests": "Lachman test and anterior drawer (ACL), posterior drawer (PCL), valgus/varus stress test (MCL/LCL), McMurray's and Thessaly test (meniscus), patellar apprehension test (instability), patellar grind/clarke's test (patellofemoral).", "Joint mobility assessment": "Tibiofemoral accessory glides, patellar mobility (superior/inferior/medial/lateral glide).", "Accessory movements": "Patellofemoral joint glides, tibiofemoral AP/PA glide.", "Outcome measures": "KOOS, Lysholm Knee Score, IKDC score."}, "reasoning": {"Likely diagnosis": "Patellofemoral pain syndrome (most common in younger/active), knee OA (older adults), meniscal tear, ligament sprain/rupture.", "Differential diagnosis": "Referred hip/lumbar pathology, ITB syndrome, patellar tendinopathy, septic arthritis, fracture.", "Clinical decision making": "Positive Lachman + pivot mechanism + audible pop strongly suggests ACL tear; joint line pain + positive McMurray's/Thessaly suggests meniscal involvement; anterior pain worse with prolonged sitting/stairs suggests patellofemoral syndrome.", "Referral criteria": "Suspected ACL/multiligament injury for surgical opinion, locked knee (mechanical block), suspected fracture, septic arthritis suspicion (urgent).", "When imaging is indicated": "Ottawa Knee Rules positive (XR), suspected ligament/meniscal tear being considered for surgery (MRI), failed conservative management of OA (XR for surgical planning)."}, "treatment": {"Short-term goals": "Reduce pain/swelling, restore ROM, regain quadriceps activation.", "Long-term goals": "Restore strength/function, return to sport/work, address biomechanical contributors.", "Patient education": "Reassurance re: OA (activity beneficial), realistic ACL rehab timelines (9-12+ months for return to pivoting sport), load management advice.", "Pain management": "Relative rest/activity modification, ice for acute swelling, analgesia per guidance.", "Manual therapy": "Patellar mobilisation for patellofemoral syndrome, tibiofemoral mobilisation for stiffness.", "Soft tissue techniques": "ITB/quadriceps/hamstring soft tissue release as adjunct.", "Joint mobilisations": "Patellofemoral glides, tibiofemoral mobilisation as indicated.", "Exercise prescription": "Quadriceps/hip strengthening programme (strong evidence for patellofemoral pain and OA), criteria-based ACL rehab progression.", "Strengthening": "Quadriceps (esp. VMO), hamstrings, gluteal/hip strengthening for proximal control.", "Stretching": "ITB, quadriceps, hamstring stretching as indicated.", "Motor control": "Landing mechanics retraining, single-leg control, hip-knee alignment during functional tasks.", "Balance training": "Progressive single-leg balance, proprioceptive training (esp. post-ACL/ligament injury).", "Functional rehabilitation": "Stair negotiation, squatting, functional loading progression.", "Sport-specific rehabilitation": "Criteria-based return-to-sport testing (hop tests, strength symmetry) before pivoting sport clearance.", "Return-to-work criteria": "Functional tolerance to job-specific kneeling/squatting/standing demands.", "Return-to-sport criteria": "Quadriceps/hamstring strength symmetry >90%, successful hop test battery, psychological readiness (e.g. ACL-RSI score).", "Home exercise programme": "Daily quadriceps/hip strengthening, ROM maintenance exercises.", "Progression criteria": "Improved KOOS/Lysholm score, reduced swelling, improved strength symmetry.", "Discharge criteria": "Functional/strength goals achieved, return-to-sport criteria met or self-management embedded."}, "pearls": {"Common mistakes": "Clearing ACL injury based on a single Lachman test without considering mechanism/effusion; rushing return-to-sport based on time alone rather than criteria-based testing.", "Key examination tips": "Assess for effusion and quadriceps inhibition early \u2014 these limit accurate strength/functional testing until addressed.", "Important clinical signs": "Immediate large effusion + pop + inability to continue activity strongly suggests ACL rupture until proven otherwise.", "Evidence-based recommendations": "Criteria-based (not time-based) return-to-sport testing significantly reduces ACL re-injury risk; exercise therapy is first-line for knee OA and patellofemoral pain."}}, "Ankle": {"anatomy": {"Bones": "Tibia, fibula, talus.", "Joints": "Talocrural (ankle mortise \u2014 dorsi/plantarflexion), subtalar joint (inversion/eversion).", "Ligaments": "Lateral ligament complex (ATFL, CFL, PTFL \u2014 ATFL most commonly injured), deltoid ligament (medial, strong), syndesmosis (AITFL/PITFL).", "Capsule": "Talocrural joint capsule, reinforced by ligamentous complexes.", "Muscles": "Gastrocnemius/soleus (plantarflexion), tibialis anterior (dorsiflexion), peroneals (eversion/lateral stability), tibialis posterior (inversion/arch support).", "Tendons": "Achilles tendon, peroneal tendons (behind lateral malleolus), tibialis posterior tendon.", "Bursae": "Retrocalcaneal bursa (Achilles-related).", "Blood supply": "Anterior/posterior tibial and peroneal arteries.", "Nerve supply": "Deep/superficial peroneal, tibial, sural nerves.", "Biomechanics": "Talocrural for dorsi/plantarflexion, subtalar for inversion/eversion; ankle in plantarflexion is most vulnerable position for lateral sprain."}, "pathology": {"Degenerative": "Ankle OA (often post-traumatic).", "Traumatic": "Lateral ankle sprain (most common MSK injury), syndesmosis injury (high ankle sprain), malleolar fracture, Achilles rupture.", "Inflammatory": "Achilles tendinopathy/paratendinopathy, retrocalcaneal bursitis.", "Neurological": "Tarsal tunnel syndrome (posterior tibial nerve entrapment).", "Sports": "Lateral ligament sprain (jumping/cutting sports), Achilles tendinopathy (running sports), peroneal tendon subluxation.", "Post-operative": "Lateral ligament reconstruction, ankle fracture ORIF, Achilles repair."}, "subjective": {"Presenting symptoms": "Ankle pain, swelling, instability ('giving way'), stiffness, difficulty weight-bearing.", "Pain characteristics": "Lateral pain (most common \u2014 lateral ligament complex), medial pain (deltoid ligament, less common but higher energy), posterior heel pain (Achilles).", "Mechanism of injury": "Inversion injury (lateral sprain, most common), eversion/external rotation (syndesmosis/high sprain), direct trauma.", "History taking": "Ability to weight-bear immediately after injury, previous sprain history (recurrence common), sporting demands.", "Functional limitations": "Walking on uneven ground, running, jumping/landing, stairs.", "Occupational considerations": "Uneven terrain work, ladder/scaffold work requiring stability.", "Sport-specific considerations": "Cutting/jumping sports (lateral sprain risk), running sports (Achilles tendinopathy).", "Red flags": "Inability to weight-bear + point tenderness over malleoli (Ottawa Ankle Rules \u2014 fracture screen), signs of compartment syndrome, suspected Achilles rupture (positive Thompson test, palpable gap).", "Yellow flags": "Fear-avoidance of return to sport after recurrent sprains, reduced confidence in ankle stability.", "Differential diagnosis questions": "Simple lateral sprain vs syndesmosis injury (higher energy, slower recovery) vs fracture \u2014 mechanism and Ottawa Ankle Rules guide this."}, "objective": {"Observation": "Swelling, bruising pattern, deformity (suggests fracture/dislocation).", "Posture": "Static foot posture, arch height (pes planus/cavus).", "Gait analysis": "Antalgic gait, reduced push-off, compensatory patterns.", "Palpation": "Lateral ligaments (ATFL/CFL), medial malleolus/deltoid, syndesmosis (squeeze test region), Achilles tendon, malleoli (Ottawa Rules points).", "Active ROM": "Dorsiflexion, plantarflexion, inversion, eversion.", "Passive ROM": "Compare to active; note capsular vs ligamentous end-feel.", "Overpressure": "Gentle once fracture excluded via Ottawa Ankle Rules/clinical judgement.", "Resisted testing": "Resisted eversion (peroneals), resisted dorsiflexion (tibialis anterior), resisted plantarflexion (calf complex).", "Strength testing": "Calf raise (single-leg), peroneal strength, dorsiflexor strength.", "Manual muscle testing": "Gastrocnemius/soleus, tibialis anterior/posterior, peroneals.", "Neurological examination": "L4-S2 screen if referred symptoms suspected; sural/peroneal nerve screen post-trauma.", "Dermatomes": "L4 medial shin, L5 dorsum foot, S1 lateral foot \u2014 lumbar referral differential.", "Myotomes": "L4 dorsiflexion, S1 plantarflexion/eversion (lumbar screen).", "Reflexes": "Achilles reflex (S1).", "Functional assessment": "Single-leg balance, single-leg heel raise, hop testing (later stage), star excursion balance test.", "Special tests": "Anterior drawer test (ATFL), talar tilt test (CFL), squeeze test and external rotation test (syndesmosis), Thompson test (Achilles rupture), Ottawa Ankle Rules for fracture screening.", "Joint mobility assessment": "Talocrural and subtalar accessory glides.", "Accessory movements": "Anterior/posterior talar glide, subtalar inversion/eversion glide.", "Outcome measures": "Foot and Ankle Ability Measure (FAAM), Cumberland Ankle Instability Tool."}, "reasoning": {"Likely diagnosis": "Lateral ankle sprain (most common), Achilles tendinopathy, syndesmosis injury, chronic ankle instability.", "Differential diagnosis": "Malleolar/fifth metatarsal fracture, peroneal tendon subluxation, tarsal tunnel syndrome, referred lumbar pathology.", "Clinical decision making": "Ottawa Ankle Rules guide need for XR; positive anterior drawer/talar tilt supports lateral ligament laxity; positive squeeze/external rotation test raises suspicion of syndesmosis injury requiring longer rehab and caution with early loading.", "Referral criteria": "Positive Ottawa Ankle Rules, suspected Achilles rupture, suspected syndesmosis disruption, recurrent instability failing conservative rehab (consider surgical opinion).", "When imaging is indicated": "Ottawa Ankle Rules positive, suspected syndesmosis injury (may need MRI/stress views), chronic instability being considered for surgical stabilisation."}, "treatment": {"Short-term goals": "Reduce pain/swelling, restore weight-bearing tolerance, protect healing ligament.", "Long-term goals": "Restore full strength/proprioception, prevent recurrent sprain, return to sport/work.", "Patient education": "Early mobilisation/functional rehab superior to prolonged immobilisation for most sprains; explain grading and expected timelines.", "Pain management": "POLICE principle (Protection, Optimal Loading, Ice, Compression, Elevation) in acute phase, graded weight-bearing.", "Manual therapy": "Talocrural/subtalar mobilisation for stiffness once acute phase settles.", "Soft tissue techniques": "Calf/peroneal soft tissue work as adjunct.", "Joint mobilisations": "Anterior/posterior talar glides to restore dorsiflexion range.", "Exercise prescription": "Progressive strengthening and proprioceptive/balance training programme (strong evidence for reducing re-injury).", "Strengthening": "Peroneal strengthening, calf strengthening (esp. eccentric for Achilles tendinopathy), dorsiflexor strengthening.", "Stretching": "Calf stretching (gastrocnemius/soleus) as indicated.", "Motor control": "Balance/proprioceptive retraining, landing mechanics for sport.", "Balance training": "Single-leg balance progression, wobble board/unstable surface training, star excursion balance drills.", "Functional rehabilitation": "Walking on uneven surfaces, running progression, cutting/pivoting drills.", "Sport-specific rehabilitation": "Graded return to jumping/cutting sports with proprioceptive brace/taping as needed initially.", "Return-to-work criteria": "Functional tolerance to occupational terrain/stability demands.", "Return-to-sport criteria": "Full strength symmetry, successful hop/agility testing, restored balance/proprioception.", "Home exercise programme": "Daily balance training, calf/peroneal strengthening.", "Progression criteria": "Improved FAAM score, reduced swelling, improved balance testing.", "Discharge criteria": "Functional goals met, recurrence-risk factors addressed (balance/strength restored)."}, "pearls": {"Common mistakes": "Over-immobilising simple lateral sprains (delays recovery); missing syndesmosis injury which needs a more cautious, extended rehab timeline than a simple lateral sprain.", "Key examination tips": "Always apply Ottawa Ankle Rules systematically to avoid missing fracture; test balance/proprioception even after pain resolves, as this is often the residual deficit driving recurrence.", "Important clinical signs": "Positive squeeze test = syndesmosis injury until proven otherwise \u2014 needs different management pathway to lateral ligament sprain.", "Evidence-based recommendations": "Functional rehabilitation with early mobilisation and balance training outperforms prolonged immobilisation; supervised exercise programmes reduce recurrent sprain rates significantly."}}, "Foot": {"anatomy": {"Bones": "Tarsals (calcaneus, talus, navicular, cuboid, 3 cuneiforms), 5 metatarsals, 14 phalanges.", "Joints": "Subtalar, midtarsal (Chopart's), tarsometatarsal (Lisfranc), metatarsophalangeal (MTP), interphalangeal.", "Ligaments": "Plantar fascia (functions as a ligament-like structure), spring ligament (supports medial arch), Lisfranc ligament.", "Capsule": "Multiple small joint capsules throughout the foot.", "Muscles": "Intrinsic foot muscles (abductor hallucis, flexor digitorum brevis etc.), extrinsic muscles acting via long tendons (tibialis anterior/posterior, peroneals, toe flexors/extensors).", "Tendons": "Achilles (technically ankle but affects foot mechanics), tibialis posterior tendon (arch support), flexor hallucis longus.", "Bursae": "Not prominent; plantar fat pad important for shock absorption.", "Blood supply": "Dorsalis pedis and posterior tibial arteries, plantar arch.", "Nerve supply": "Tibial nerve (plantar surface via medial/lateral plantar nerves), superficial/deep peroneal nerves (dorsum).", "Biomechanics": "Medial longitudinal arch for shock absorption/propulsion; windlass mechanism (plantar fascia tensions with toe extension during push-off)."}, "pathology": {"Degenerative": "1st MTP OA (hallux rigidus), midfoot OA.", "Traumatic": "Lisfranc injury, metatarsal fracture (esp. 5th metatarsal \u2014 Jones fracture), stress fracture.", "Inflammatory": "Plantar fasciitis/fasciopathy, gout (classically 1st MTP), rheumatoid forefoot involvement.", "Neurological": "Morton's neuroma (interdigital nerve entrapment), tarsal tunnel syndrome.", "Sports": "Stress fractures (runners), plantar fasciopathy (runners), turf toe (1st MTP hyperextension injury).", "Post-operative": "Bunion (hallux valgus) correction, Lisfranc fixation, plantar fascia release."}, "subjective": {"Presenting symptoms": "Heel pain, forefoot pain, arch pain, numbness/burning between toes, difficulty with footwear.", "Pain characteristics": "First-step morning pain (classic plantar fasciopathy), burning/numbness between toes (Morton's neuroma), pain with push-off (1st MTP/hallux rigidus).", "Mechanism of injury": "Overuse/repetitive loading (fasciopathy, stress fracture), acute forced hyperextension (turf toe), twisting injury (Lisfranc).", "History taking": "Footwear history, recent activity/training load changes, occupational standing demands.", "Functional limitations": "Standing tolerance, walking distance, footwear choices, running/sport participation.", "Occupational considerations": "Prolonged standing on hard surfaces, footwear requirements (safety boots).", "Sport-specific considerations": "Running load changes (stress fracture/fasciopathy risk), sports requiring rapid direction change on firm ground.", "Red flags": "Suspected stress fracture with focal bony tenderness and pain on hopping, suspected Lisfranc injury (midfoot pain/swelling/bruising after twisting injury with inability to weight-bear), signs of infection (diabetic foot ulcer/cellulitis).", "Yellow flags": "Frustration/anxiety with prolonged, slow-resolving plantar fasciopathy; fear of re-injury in runners.", "Differential diagnosis questions": "Localised bony pain (stress fracture) vs diffuse soft tissue pain (fasciopathy); nerve-type symptoms (burning, numbness) vs mechanical pain."}, "objective": {"Observation": "Arch height (pes planus/cavus), toe deformities (hallux valgus, claw/hammer toes), skin changes (diabetic foot screen).", "Posture": "Static foot posture in standing, navicular drop test.", "Gait analysis": "Foot strike pattern, pronation/supination during stance, push-off quality.", "Palpation": "Plantar fascia origin at calcaneus, metatarsal heads, interdigital spaces (Morton's neuroma), Lisfranc joint line.", "Active ROM": "1st MTP flexion/extension (esp. dorsiflexion for hallux rigidus screen), subtalar inversion/eversion, toe flexion/extension.", "Passive ROM": "Compare to active; note restriction pattern at 1st MTP.", "Overpressure": "Gentle, avoid over suspected fracture site.", "Resisted testing": "Resisted toe flexion/extension, resisted 1st MTP dorsiflexion.", "Strength testing": "Intrinsic foot muscle strength (harder to isolate clinically), calf strength (affects forefoot loading).", "Manual muscle testing": "Toe flexors/extensors, tibialis posterior/anterior.", "Neurological examination": "Screen tibial/peroneal nerve distributions if neuropathic symptoms; monofilament testing if diabetic neuropathy suspected.", "Dermatomes": "L4-S1 relevant for referred lumbar pathology to foot.", "Myotomes": "L5 big toe extension, S1 plantarflexion/eversion \u2014 lumbar screen.", "Reflexes": "Achilles reflex (S1) if referred pathology suspected.", "Functional assessment": "Single-leg heel raise, hopping, gait over distance, footwear assessment.", "Special tests": "Windlass test (plantar fasciopathy), Mulder's click test (Morton's neuroma), squeeze test for metatarsal stress fracture, Lisfranc stress test (piano key test).", "Joint mobility assessment": "1st MTP, subtalar, midtarsal joint mobility.", "Accessory movements": "Metatarsal AP glides, 1st MTP dorsiflexion glide.", "Outcome measures": "Foot and Ankle Ability Measure (FAAM), Manchester-Oxford Foot Questionnaire."}, "reasoning": {"Likely diagnosis": "Plantar fasciopathy (most common heel pain presentation), Morton's neuroma, hallux rigidus/valgus, metatarsal stress fracture.", "Differential diagnosis": "Lisfranc injury, tarsal tunnel syndrome, referred lumbar pathology (S1 particularly), inflammatory arthropathy (gout at 1st MTP), calcaneal stress fracture.", "Clinical decision making": "First-step morning pain + tenderness at calcaneal fascia origin + positive windlass test supports plantar fasciopathy; focal bony tenderness with pain on hopping suggests stress fracture requiring imaging and load modification.", "Referral criteria": "Suspected Lisfranc injury (urgent, high missed-injury risk), suspected stress fracture not settling with load management, diabetic foot changes/ulceration (podiatry/vascular referral), suspected gout (medical management).", "When imaging is indicated": "Suspected stress fracture (XR often initially negative \u2014 may need MRI/bone scan), suspected Lisfranc injury (weight-bearing XR), failure of conservative management for fasciopathy."}, "treatment": {"Short-term goals": "Reduce pain with weight-bearing, identify and modify contributing load factors.", "Long-term goals": "Restore full function/activity tolerance, prevent recurrence via load management and footwear/orthotic strategies.", "Patient education": "Plantar fasciopathy typically has a slow but favourable natural history (often 6-18 months); load management principles for training errors.", "Pain management": "Relative rest from aggravating activity, footwear modification, taping/orthotics as adjunct.", "Manual therapy": "Soft tissue release to plantar fascia/calf, joint mobilisation for 1st MTP/subtalar restriction.", "Soft tissue techniques": "Calf and plantar fascia soft tissue work, self-massage with ball/roller.", "Joint mobilisations": "1st MTP mobilisation for hallux rigidus, subtalar mobilisation as indicated.", "Exercise prescription": "Progressive plantar fascia-specific loading (high-load strength training shows strong evidence), calf strengthening.", "Strengthening": "Calf raises (straight and bent knee), intrinsic foot muscle strengthening (short foot exercises), toe strengthening.", "Stretching": "Calf and plantar fascia stretching (adjunct to loading programme).", "Motor control": "Foot intrinsic muscle activation retraining, gait retraining if pronation-related.", "Balance training": "Single-leg balance work as part of broader lower limb programme.", "Functional rehabilitation": "Graded return to standing/walking tolerance, footwear review.", "Sport-specific rehabilitation": "Graded running load progression with monitoring for symptom recurrence.", "Return-to-work criteria": "Functional standing/walking tolerance for occupational demands.", "Return-to-sport criteria": "Pain-free running/loading progression completed, addressed training load errors.", "Home exercise programme": "Daily calf raises/plantar fascia loading programme, stretching.", "Progression criteria": "Reduced first-step pain, improved loading tolerance, improved FAAM score.", "Discharge criteria": "Functional goals met, load management strategies embedded."}, "pearls": {"Common mistakes": "Expecting rapid resolution of plantar fasciopathy and under-dosing loading exercise; missing Lisfranc injury in a 'sprained midfoot' after a twisting injury.", "Key examination tips": "Always palpate calcaneal fascia origin specifically and use the windlass test to reproduce symptoms.", "Important clinical signs": "Inability to weight-bear after a twisting midfoot injury with bruising on the plantar surface strongly suggests Lisfranc injury \u2014 urgent referral.", "Evidence-based recommendations": "High-load strength training (calf raises with towel under toes) has strong emerging evidence for plantar fasciopathy, often outperforming stretching alone."}}, "Temporomandibular Joint (TMJ)": {"anatomy": {"Bones": "Mandibular condyle, temporal bone (mandibular/glenoid fossa).", "Joints": "TMJ \u2014 a synovial joint with a unique intra-articular disc dividing it into upper and lower compartments.", "Ligaments": "Temporomandibular ligament, sphenomandibular and stylomandibular ligaments (accessory).", "Capsule": "Loose fibrous capsule allowing translation and rotation.", "Muscles": "Masseter, temporalis, medial/lateral pterygoids (muscles of mastication); also influenced by cervical posture and suprahyoid muscles.", "Tendons": "Temporalis tendon inserting on coronoid process.", "Bursae": "Not applicable \u2014 intra-articular disc is the key structure instead.", "Blood supply": "Superficial temporal and maxillary arteries.", "Nerve supply": "Auriculotemporal and masseteric branches of the mandibular division of the trigeminal nerve (CN V3).", "Biomechanics": "Combined rotation (lower compartment) and translation (upper compartment) during mouth opening; disc normally moves with the condyle."}, "pathology": {"Degenerative": "TMJ OA.", "Traumatic": "Condylar fracture, direct trauma/dislocation.", "Inflammatory": "Rheumatoid arthritis involvement (less common), juvenile idiopathic arthritis.", "Neurological": "Referred pain from trigeminal neuralgia (differential, not TMJ pathology itself).", "Sports": "Direct facial trauma (contact sports).", "Post-operative": "TMJ arthroscopy/arthroplasty \u2014 rare, reserved for refractory internal derangement."}, "subjective": {"Presenting symptoms": "Jaw pain, clicking/popping, locking (open or closed), headache, ear pain/fullness.", "Pain characteristics": "Pain with chewing/talking/yawning; may be unilateral or bilateral; often associated with clenching/bruxism.", "Mechanism of injury": "Often insidious \u2014 associated with bruxism, stress, parafunctional habits (nail biting, gum chewing), or direct trauma.", "History taking": "Stress levels, sleep quality/bruxism history, dental history, previous orthodontic treatment.", "Functional limitations": "Eating (esp. hard/chewy foods), talking for long periods, yawning.", "Occupational considerations": "High-stress occupations associated with clenching/bruxism, prolonged talking (teaching, call centres).", "Sport-specific considerations": "Contact sports with facial trauma risk (mouthguard use relevant).", "Red flags": "Trauma with suspected fracture/dislocation, signs of septic arthritis, unremitting pain with systemic symptoms, sudden inability to close mouth (acute dislocation).", "Yellow flags": "High stress/anxiety contributing to clenching/bruxism, sleep disturbance.", "Differential diagnosis questions": "Is pain purely with jaw movement (TMJ/muscular) or also present at rest/with cervical movement (referred cervical or dental origin)? Screen for dental pathology as differential."}, "objective": {"Observation": "Facial symmetry, jaw deviation on opening, muscle bulk (masseter hypertrophy with bruxism).", "Posture": "Cervical/head posture \u2014 forward head posture associated with TMJ dysfunction.", "Gait analysis": "Not relevant.", "Palpation": "Masseter, temporalis, TMJ itself (preauricular), intraorally if trained/appropriate.", "Active ROM": "Mouth opening (normal ~35-50mm), lateral deviation, protrusion.", "Passive ROM": "Gentle overpressure into opening if appropriate and within scope.", "Overpressure": "Very gentle; TMJ assessment requires specific training \u2014 refer to specialist if uncertain.", "Resisted testing": "Resisted jaw opening/closing/lateral deviation for muscular screen.", "Strength testing": "Not routinely quantified; more focus on movement quality/symmetry.", "Manual muscle testing": "Masseter, temporalis, pterygoids (clinical screening only).", "Neurological examination": "Cranial nerve V (trigeminal) sensory screen if atypical facial pain.", "Dermatomes": "Not applicable in traditional sense; trigeminal divisions (V1-V3) relevant for facial pain differential.", "Myotomes": "Not applicable.", "Reflexes": "Jaw jerk reflex (rarely tested clinically, upper motor neuron screen).", "Functional assessment": "Chewing tolerance, talking endurance, yawning without locking.", "Special tests": "Deviation pattern on opening (C-shaped or S-shaped deviation suggests disc displacement), joint sound palpation (click/crepitus timing), cervical spine screening as differential source.", "Joint mobility assessment": "TMJ translation/rotation quality bilaterally.", "Accessory movements": "Specialist technique \u2014 typically within advanced/specialist TMJ physiotherapy scope.", "Outcome measures": "Jaw Functional Limitation Scale (JFLS), TMJ Disability Index."}, "reasoning": {"Likely diagnosis": "Myofascial TMJ dysfunction (most common \u2014 muscular), disc displacement (with or without reduction), degenerative TMJ OA.", "Differential diagnosis": "Dental pathology, trigeminal neuralgia, cervicogenic headache/referred cervical pain, ENT pathology (otitis media referral).", "Clinical decision making": "Pain reproduced with palpation of masticatory muscles + normal joint sounds suggests myofascial origin; clicking with deviation pattern suggests disc displacement; locking (closed) suggests disc displacement without reduction.", "Referral criteria": "Suspected acute dislocation, suspected fracture, refractory symptoms not responding to conservative management (dental/OMFS referral), suspected dental pathology.", "When imaging is indicated": "Persistent symptoms not responding to conservative care, suspected structural derangement being considered for specialist intervention, trauma."}, "treatment": {"Short-term goals": "Reduce muscular tension/pain, improve mouth opening comfort.", "Long-term goals": "Reduce parafunctional habits, restore comfortable function for eating/talking.", "Patient education": "Explain the role of stress/clenching, soft diet advice during flares, avoid excessive gum chewing/wide yawning during acute phase.", "Pain management": "Heat/relaxation techniques, jaw rest advice, stress management strategies.", "Manual therapy": "Soft tissue release to masseter/temporalis, gentle joint mobilisation (specialist training required).", "Soft tissue techniques": "Masseter/temporalis trigger point release, myofascial techniques.", "Joint mobilisations": "Gentle TMJ mobilisation within scope/training, otherwise refer to specialist.", "Exercise prescription": "Controlled jaw opening/closing exercises, isometric jaw exercises for stability.", "Strengthening": "Isometric strengthening of jaw musculature for stability (as appropriate).", "Stretching": "Gentle jaw stretching within pain-free range.", "Motor control": "Retraining symmetrical opening pattern, reducing compensatory deviation.", "Balance training": "Not applicable.", "Functional rehabilitation": "Gradual return to normal diet, talking endurance building.", "Sport-specific rehabilitation": "Mouthguard fitting advice for contact sport return post-trauma.", "Return-to-work criteria": "Comfortable talking/eating tolerance for occupational demands.", "Return-to-sport criteria": "Cleared for contact sport post-trauma with appropriate protective equipment.", "Home exercise programme": "Daily gentle jaw ROM exercises, relaxation techniques, posture awareness.", "Progression criteria": "Improved pain-free mouth opening, reduced muscular tenderness.", "Discharge criteria": "Functional goals met, self-management/stress-reduction strategies established."}, "pearls": {"Common mistakes": "Attempting aggressive manual techniques on TMJ without specific specialist training; missing dental pathology as a differential for facial pain.", "Key examination tips": "Always screen cervical spine as a contributing/differential source of jaw and facial pain.", "Important clinical signs": "Sudden inability to close the mouth after wide yawning suggests acute anterior dislocation \u2014 requires prompt reduction.", "Evidence-based recommendations": "Conservative management (education, exercise, stress management) is first-line and effective for most TMJ disorders; splints/dental referral reserved for refractory cases."}}, "Sacroiliac Joint": {"anatomy": {"Bones": "Sacrum, ilium (forms the sacroiliac joint).", "Joints": "SIJ \u2014 a combination synovial (anterior/inferior) and syndesmotic (posterior/superior) joint, highly variable and irregular surface for stability.", "Ligaments": "Anterior/posterior sacroiliac ligaments, sacrotuberous and sacrospinous ligaments, interosseous ligament.", "Capsule": "Thin anteriorly, reinforced significantly posteriorly by ligaments \u2014 SIJ relies heavily on ligamentous 'form closure' and muscular 'force closure' for stability.", "Muscles": "Gluteus maximus, piriformis, latissimus dorsi/thoracolumbar fascia (via force closure mechanism), multifidus, biceps femoris.", "Tendons": "No major discrete tendons; force transmission is via fascial/muscular slings across the joint.", "Bursae": "Not clinically significant.", "Blood supply": "Superior/lateral sacral arteries.", "Nerve supply": "Innervated by L4-S3 posterior rami \u2014 contributes to overlapping referral patterns with lumbar spine.", "Biomechanics": "Very limited motion (a few degrees of nutation/counter-nutation); primary role is load transfer between spine and lower limbs, not mobility."}, "pathology": {"Degenerative": "SIJ OA (esp. post-fusion adjacent segment, or age-related).", "Traumatic": "Pelvic fracture/ring injury (high energy), postpartum SIJ pain/instability.", "Inflammatory": "Sacroiliitis \u2014 hallmark feature of axial spondyloarthritis/ankylosing spondylitis (screen in young patients with inflammatory back pain pattern).", "Neurological": "Not a primary neurological structure but can mimic/coexist with lumbar radiculopathy referral.", "Sports": "Overuse-related SIJ pain in running/kicking sports, pregnancy-related pelvic girdle pain (not sport-specific but common presentation).", "Post-operative": "SIJ fusion surgery (for confirmed refractory SIJ pain)."}, "subjective": {"Presenting symptoms": "Unilateral (usually) low back/buttock pain, often below L5 level, may refer to posterior thigh.", "Pain characteristics": "Pain localised with one finger to the PSIS region (Fortin finger test concept), worse with unilateral loading (standing on one leg, stairs).", "Mechanism of injury": "Pregnancy/postpartum (hormonal ligament laxity + biomechanical change), fall onto buttock, twisting injury, insidious onset.", "History taking": "Pregnancy/postpartum status, previous pelvic trauma, ance regarding favourable prognosis of most SIJ/pelvic girdle pain, especially postpartum; explain force closure concept simply.", "Pain management": "Pelvic support belt as short-term adjunct, activity modification for aggravating asymmetrical loading.", "Manual therapy": "SIJ mobilisation/manipulation as adjunct to exercise where appropriate.", "Soft tissue techniques": "Gluteal and piriformis soft tissue release for symptomatic relief.", "Joint mobilisations": "Grade based on irritability; often combined with stability-focused exercise.", "Exercise prescription": "Force closure/stability-focused exercise programme \u2014 deep abdominal, gluteal, and pelvic floor (where relevant) activation.", "Strengthening": "Gluteus medius/maximus, deep abdominal wall, multifidus strengthening.", "Stretching": "Piriformis/hip rotator stretching as indicated for symptomatic relief.", "Motor control": "Retraining symmetrical loading during gait/transfers, avoiding excessive unilateral stance load initially.", "Balance training": "Progressive single-leg stance tolerance as symptoms allow.", "Functional rehabilitation": "Graded return to rolling, transfers, single-leg tasks (stairs, dressing).", "Sport-specific rehabilitation": "Graded return to running/kicking with attention to symmetrical mechanics.", "Return-to-work criteria": "Functional tolerance to occupational standing/lifting/transfer demands.", "Return-to-sport criteria": "Pain-free single-leg loading, restored symmetrical running/kicking mechanics.", "Home exercise programme": "Daily deep core/gluteal activation exercises, pelvic belt use as advised.", "Progression criteria": "Reduced pain on provocation cluster, improved functional transfer tolerance.", "Discharge criteria": "Functional goals met, self-management/stability strategies embedded."}, "pearls": {"Common mistakes": "Diagnosing SIJ pain from a single provocation test rather than a cluster; missing inflammatory sacroiliitis in young patients with typical inflamm   </div>`;
  html += `<div class="nav-group"><div class="nav-group-title">Section 3 · Regional Joints</div><div class="joint-list">`;
  jointKeys.forEach(j=>{
    html += `<a href="#joint-${slug(j)}" class="nav-link" data-nav="joint-${slug(j)}">${ICONS.bone}${j}</a>`;
  });
  html += `</div></div>`;
  nav.innerHTML = html;
  nav.querySelectorAll('.nav-link').forEach(a=>{
    a.addEventListener('click', (e)=>{
      if(window.innerWidth<=900){ document.getElementById('sidebar').classList.remove('open'); }
    });
  });
}

function setActiveNav(id){
  document.querySelectorAll('.nav-link').forEach(a=>a.classList.toggle('active', a.dataset.nav===id));
}

function renderList(items){
  return `<ul>${items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
}

function card(title, items){
  return `<div class="card"><div class="card-title">${title}</div>${renderList(items)}</div>`;
}

function callout(type, iconKey, title, items){
  return `<div class="callout ${type}">${ICONS[iconKey]}<div><div class="callout-title">${title}</div>${renderList(items)}</div></div>`;
}

function accordion(title, bodyHtml, openFirst){
  return `<div class="accordion${openFirst?' open':''}">
    <button class="accordion-head" onclick="toggleAccordion(this)">
      <span>${title}</span>${ICONS.chevron}
    </button>
    <div class="accordion-body" style="${openFirst?'max-height:2000px':''}"><div class="accordion-body-inner">${bodyHtml}</div></div>
  </div>`;
}
function toggleAccordion(btn){
  const acc = btn.closest('.accordion');
  const body = acc.querySelector('.accordion-body');
  const isOpen = acc.classList.contains('open');
  if(isOpen){ acc.classList.remove('open'); body.style.maxHeight = 0; }
  else{ acc.classList.add('open'); body.style.maxHeight = body.scrollHeight+40+'px'; }
}

function renderHome(){
  document.getElementById('breadcrumb').innerHTML = `<b>MSK Assessment Guide</b>`;
  setActiveNav('home');
  let html = `<div class="hero-banner">
    <h1>Musculoskeletal Assessment Guide</h1>
    <p>A comprehensive, evidence-based clinical handbook covering assessment principles, the general MSK process, and joint-by-joint pathways for 13 regions — anatomy, pathology, subjective/objective assessment, clinical reasoning, treatment planning, and clinical pearls.</p>
    <div class="hero-stats">
      <div class="hero-stat"><b>13</b><span>Regional Joints</span></div>
      <div class="hero-stat"><b>7</b><span>Sections per Joint</span></div>
      <div class="hero-stat"><b>91</b><span>Total Sub-Modules</span></div>
    </div>
  </div>`;
  html += `<h2 style="font-size:1.15rem;margin-bottom:.9rem;">Jump to a region</h2>`;
  html += `<div class="joint-grid">`;
  jointKeys.forEach(j=>{
    html += `<button class="joint-tile" onclick="navigate('joint-${slug(j)}')">
      ${ICONS.bone}<div class="joint-tile-title">${j}</div>
      <div class="joint-tile-sub">7 assessment sections</div>
    </button>`;
  });
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

function renderIntro(){
  const d = MSK_DATA.intro;
  document.getElementById('breadcrumb').innerHTML = `<button class="nav-link" style="padding:.2rem .4rem" onclick="navigate('home')">Home</button> / <b>Introduction</b>`;
  setActiveNav('intro');
  let html = `<div class="page-title">1. Introduction to Musculoskeletal Assessment</div>
  <p class="page-sub">Foundational principles, clinical reasoning frameworks, and screening models that underpin every regional assessment in this guide.</p>`;

  html += `<div class="section-block"><div class="section-heading"><span class="num">1</span>Principles of MSK Assessment</div>${card('Core principles', d.principles)}</div>`;
  html += `<div class="section-block"><div class="section-heading"><span class="num">2</span>Clinical Reasoning</div>${card('Reasoning framework', d.clinical_reasoning)}</div>`;

  html += `<div class="section-block"><div class="section-heading"><span class="num">3</span>Red &amp; Yellow Flags</div>
    ${callout('red','alert','Red Flags — Screen for Serious Pathology', d.red_flags)}
    ${callout('yellow','flag','Yellow Flags — Psychosocial Risk Factors', d.yellow_flags)}
  </div>`;

  html += `<div class="section-block"><div class="section-heading"><span class="num">4</span>Biopsychosocial Model</div>${card('Domains of the biopsychosocial model', d.biopsychosocial)}</div>`;
  html += `<div class="section-block"><div class="section-heading"><span class="num">5</span>Evidence-Based Assessment</div>${card('Principles', d.evidence_based)}</div>`;

  html += `<div class="section-block"><div class="section-heading"><span class="num">6</span>SOAP &amp; ICF Frameworks</div>
    <div class="grid-2">
      ${card('SOAP documentation framework', d.soap)}
      ${card('ICF framework domains', d.icf)}
    </div>
  </div>`;

  html += `<div class="section-block"><div class="section-heading"><span class="num">7</span>Patient-Centred Assessment</div>${card('Principles', d.patient_centred)}</div>`;

  document.getElementById('content').innerHTML = html;
}

function renderProcess(){
  const steps = MSK_DATA.intro.general_process_steps;
  document.getElementById('breadcrumb').innerHTML = `<button class="nav-link" style="padding:.2rem .4rem" onclick="navigate('home')">Home</button> / <b>General Assessment Process</b>`;
  setActiveNav('process');
  let html = `<div class="page-title">2. General MSK Assessment Process</div>
  <p class="page-sub">A structured 18-step interview and screening sequence applied to every patient, regardless of the region involved, before regional testing begins.</p>`;
  html += `<div class="flow">`;
  let i=1;
  Object.entries(steps).forEach(([title, items])=>{
    html += `<div class="flow-step"><div class="flow-dot">${i}</div><div class="flow-content"><b>${title}</b><span>${items.join(' ')}</span></div></div>`;
    i++;
  });
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

function renderJoint(jointName){
  const d = MSK_DATA.joints[jointName];
  document.getElementById('breadcrumb').innerHTML = `<button class="nav-link" style="padding:.2rem .4rem" onclick="navigate('home')">Home</button> / <span>Regional Joints</span> / <b>${jointName}</b>`;
  setActiveNav('joint-'+slug(jointName));

  let html = `<div class="pill">Section 3 · Regional Assessment</div>
  <div class="page-title">${jointName}</div>
  <p class="page-sub">Complete assessment pathway: anatomy, pathology, subjective and objective examination, clinical reasoning, treatment planning, and clinical pearls.</p>`;

  html += `<div style="margin-bottom:1.5rem">`;
  SECTION_DEFS.forEach(s=>{
    html += `<a href="#jsec-${s.key}" class="toc-chip" onclick="scrollToSection(event,'jsec-${s.key}')">${ICONS[s.icon]}${s.title}</a>`;
  });
  html += `</div>`;

  SECTION_DEFS.forEach((s, idx)=>{
    const secData = d[s.key];
    html += `<div class="section-block" id="jsec-${s.key}"><div class="section-heading"><span class="num">${idx+1}</span>${s.title}</div>`;

    if(s.key === 'anatomy' || s.key === 'pathology'){
      html += `<div class="table-wrap"><table class="clin"><tbody>`;
      Object.entries(secData).forEach(([k,v])=>{
        html += `<tr><th style="width:180px">${k}</th><td>${v}</td></tr>`;
      });
      html += `</tbody></table></div>`;
    } else if(s.key === 'reasoning'){
      html += `<div class="grid-2">`;
      Object.entries(secData).forEach(([k,v])=>{
        const iconMap = {"Likely diagnosis":"target","Differential diagnosis":"layers","Clinical decision making":"brain","Referral criteria":"alert","When imaging is indicated":"search"};
        html += `<div class="card"><div class="card-title">${ICONS[iconMap[k]||'target']} ${k}</div><p style="font-size:.9rem;color:var(--color-text);margin-top:.3rem">${v}</p></div>`;
      });
      html += `</div>`;
    } else if(s.key === 'pearls'){
      html += callout('blue','lightbulb','Common Mistakes', [secData['Common mistakes']]);
      html += callout('green','target','Key Examination Tips', [secData['Key examination tips']]);
      html += callout('red','alert','Important Clinical Signs', [secData['Important clinical signs']]);
      html += callout('yellow','book','Evidence-Based Recommendations', [secData['Evidence-based recommendations']]);
    } else {
      // subjective / objective / treatment as accordions
      let bodyEntries = Object.entries(secData);
      bodyEntries.forEach(([k,v], i2)=>{
        const isFlag = /red flag/i.test(k);
        const isYellow = /yellow flag/i.test(k);
        let inner = `<p style="font-size:.9rem">${v}</p>`;
        if(isFlag){ inner = `<div class="callout red" style="margin:0">${ICONS.alert}<div><p>${v}</p></div></div>`; }
        if(isYellow){ inner = `<div class="callout yellow" style="margin:0">${ICONS.flag}<div><p>${v}</p></div></div>`; }
        html += accordion(k, inner, i2<2);
      });
    }
    html += `</div>`;
  });

  document.getElementById('content').innerHTML = html;
  requestAnimationFrame(()=>{
    document.querySelectorAll('.accordion.open .accordion-body').forEach(b=>{
      b.style.maxHeight = b.scrollHeight+40+'px';
    });
  });
}

function scrollToSection(e, id){
  e.preventDefault();
  const el = document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

function navigate(id){
  window.location.hash = id;
}

function router(){
  const hash = window.location.hash.replace('#','') || 'home';
  document.getElementById('content').scrollTop = 0;
  window.scrollTo(0,0);
  if(hash === 'home'){ renderHome(); return; }
  if(hash === 'intro'){ renderIntro(); return; }
  if(hash === 'process'){ renderProcess(); return; }
  if(hash.startsWith('joint-')){
    const s = hash.replace('joint-','');
    const found = jointKeys.find(j=>slug(j)===s);
    if(found){ renderJoint(found); return; }
  }
  renderHome();
}

window.addEventListener('hashchange', router);

// SEARCH
function buildSearchIndex(){
  const idx = [];
  idx.push({id:'home', title:'Overview', section:'Home', text:'overview home dashboard'});
  idx.push({id:'intro', title:'Introduction to MSK Assessment', section:'Section 1', text:JSON.stringify(MSK_DATA.intro).toLowerCase()});
  idx.push({id:'process', title:'General MSK Assessment Process', section:'Section 2', text:'process demographics history mechanism pain 24 hour function flags goals'});
  jointKeys.forEach(j=>{
    idx.push({id:'joint-'+slug(j), title:j, section:'Section 3 — Regional Joint', text: JSON.stringify(MSK_DATA.joints[j]).toLowerCase()});
  });
  return idx;
}
const searchIndex = buildSearchIndex();

document.getElementById('searchInput').addEventListener('input', function(e){
  const q = e.target.value.trim().toLowerCase();
  const nav = document.getElementById('navTree');
  if(!q){ buildNav(); return; }
  const results = searchIndex.filter(r => r.text.includes(q) || r.title.toLowerCase().includes(q));
  let html = `<div class="nav-group-title">Results (${results.length})</div>`;
  if(results.length===0){ html += `<div class="search-empty">No matches for "${q}"</div>`; }
  results.forEach(r=>{
    html += `<a href="#${r.id}" class="nav-link" data-nav="${r.id}">${ICONS.search}<span>${r.title}<br><span style="font-size:.72rem;color:var(--color-text-faint)">${r.section}</span></span></a>`;
  });
  nav.innerHTML = html;
});

// Sidebar toggle (mobile)
document.getElementById('sidebarToggle').addEventListener('click', ()=>{
  const sb = document.getElementById('sidebar');
  if(window.innerWidth<=900){ sb.classList.toggle('open'); }
  else{ sb.classList.toggle('collapsed'); }
});

// Theme toggle
(function(){
  const toggle = document.getElementById('themeToggle');
  const root = document.documentElement;
  let dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  root.setAttribute('data-theme', dark?'dark':'light');
  toggle.addEventListener('click', ()=>{
    dark = !dark;
    root.setAttribute('data-theme', dark?'dark':'light');
    toggle.innerHTML = dark
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });
})();

buildNav();
router();
</script>
