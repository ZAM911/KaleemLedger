<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSK Assessment Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<style>
:root, [data-theme="light"]{
  --color-bg:#f7f6f2; --color-surface:#f9f8f5; --color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec; --color-surface-offset-2:#edeae5; --color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5; --color-border:#d4d1ca;
  --color-text:#28251d; --color-text-muted:#7a7974; --color-text-faint:#bab9b4; --color-text-inverse:#f9f8f4;
  --color-primary:#01696f; --color-primary-hover:#0c4e54; --color-primary-active:#0f3638; --color-primary-highlight:#cedcd8;
  --color-warning:#964219; --color-warning-highlight:#ddcfc6;
  --color-error:#a12c7b; --color-error-highlight:#e0ced7;
  --color-notification:#a13544; --color-notification-highlight:#dececb;
  --color-success:#437a22; --color-success-highlight:#d4dfcc;
  --color-blue:#006494; --color-blue-highlight:#c6d8e4;
  --color-gold:#d19900; --color-gold-highlight:#e9e0c6;
  --radius-sm:.375rem; --radius-md:.5rem; --radius-lg:.75rem; --radius-xl:1rem; --radius-full:9999px;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/.06); --shadow-md:0 4px 12px oklch(0.2 0.01 80/.08); --shadow-lg:0 12px 32px oklch(0.2 0.01 80/.12);
  --font-display:'Source Serif 4', Georgia, serif; --font-body:'General Sans','Helvetica Neue',sans-serif;
}
[data-theme="dark"]{
  --color-bg:#171614; --color-surface:#1c1b19; --color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a; --color-surface-offset-2:#22211f; --color-surface-dynamic:#2d2c2a;
  --color-divider:#262523; --color-border:#393836;
  --color-text:#cdccca; --color-text-muted:#797876; --color-text-faint:#5a5957; --color-text-inverse:#2b2a28;
  --color-primary:#4f98a3; --color-primary-hover:#227f8b; --color-primary-active:#1a626b; --color-primary-highlight:#313b3b;
  --color-warning:#bb653b; --color-warning-highlight:#564942;
  --color-error:#d163a7; --color-error-highlight:#4c3d46;
  --color-notification:#dd6974; --color-notification-highlight:#574848;
  --color-success:#6daa45; --color-success-highlight:#3a4435;
  --color-blue:#5591c7; --color-blue-highlight:#3a4550;
  --color-gold:#e8af34; --color-gold-highlight:#4d4332;
  --shadow-sm:0 1px 2px oklch(0 0 0/.2); --shadow-md:0 4px 12px oklch(0 0 0/.3); --shadow-lg:0 12px 32px oklch(0 0 0/.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;scroll-padding-top:1rem}
body{min-height:100dvh;line-height:1.6;font-family:var(--font-body);font-size:16px;color:var(--color-text);background:var(--color-bg)}
img,svg{display:block;max-width:100%}
ul[role="list"]{list-style:none}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px;border-radius:4px}
h1,h2,h3,h4,h5{font-family:var(--font-display);line-height:1.2;color:var(--color-text)}
a{color:var(--color-primary)}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
table{border-collapse:collapse;width:100%}

/* LAYOUT */
.app{display:flex;min-height:100dvh}
.sidebar{
  width:300px; flex-shrink:0; background:var(--color-surface); border-right:1px solid var(--color-border);
  height:100dvh; position:sticky; top:0; overflow-y:auto; padding:1.25rem 1rem; transition:transform .25s cubic-bezier(.16,1,.3,1);
}
.sidebar.collapsed{transform:translateX(-300px); position:fixed; z-index:40}
.main{flex:1; min-width:0; display:flex; flex-direction:column}
.topbar{
  position:sticky; top:0; z-index:30; background:color-mix(in oklab, var(--color-bg) 88%, transparent);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--color-border);
  display:flex; align-items:center; gap:.75rem; padding:.75rem 1.25rem;
}
.content{max-width:900px; margin:0 auto; padding:2rem 1.5rem 6rem; width:100%}
@media (max-width:900px){
  .sidebar{position:fixed; z-index:50; transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .content{padding:1.25rem 1rem 6rem}
}

/* SIDEBAR */
.brand{display:flex;align-items:center;gap:.6rem;padding:.4rem .4rem 1rem;border-bottom:1px solid var(--color-divider);margin-bottom:.75rem}
.brand svg{width:30px;height:30px;color:var(--color-primary);flex-shrink:0}
.brand-text{font-family:var(--font-display);font-weight:600;font-size:1.05rem;line-height:1.15}
.brand-text span{display:block;font-family:var(--font-body);font-size:.7rem;color:var(--color-text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.nav-search{position:relative;margin-bottom:1rem}
.nav-search input{
  width:100%; padding:.55rem .7rem .55rem 2.1rem; border-radius:var(--radius-md);
  border:1px solid var(--color-border); background:var(--color-surface-2); color:var(--color-text); font-size:.85rem;
}
.nav-search svg{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--color-text-faint)}
.nav-group{margin-bottom:.4rem}
.nav-group-title{
  font-size:.68rem; text-transform:uppercase; letter-spacing:.06em; color:var(--color-text-faint);
  padding:.6rem .5rem .3rem; font-weight:600;
}
.nav-link{
  display:flex; align-items:center; gap:.55rem; width:100%; text-align:left; padding:.5rem .6rem;
  border-radius:var(--radius-md); font-size:.85rem; color:var(--color-text-muted); font-weight:500;
}
.nav-link:hover{background:var(--color-surface-offset); color:var(--color-text)}
.nav-link.active{background:var(--color-primary-highlight); color:var(--color-primary-active); font-weight:600}
.nav-link svg{width:15px;height:15px;flex-shrink:0;opacity:.75}
.joint-list{padding-left:.35rem; border-left:1px solid var(--color-divider); margin-left:.9rem}

/* TOPBAR CONTROLS */
.icon-btn{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);
  color:var(--color-text-muted);
}
.icon-btn:hover{background:var(--color-surface-offset); color:var(--color-text)}
.icon-btn svg{width:19px;height:19px}
.breadcrumb{font-size:.82rem; color:var(--color-text-muted); display:flex; gap:.4rem; align-items:center; flex-wrap:wrap}
.breadcrumb b{color:var(--color-text); font-weight:600}
.spacer{flex:1}

/* CONTENT ELEMENTS */
.page-title{font-size:clamp(1.75rem,1.3rem+1.5vw,2.4rem); font-weight:700; margin-bottom:.4rem}
.page-sub{color:var(--color-text-muted); font-size:1rem; margin-bottom:2rem; max-width:70ch}
.section-block{margin-bottom:2.25rem; padding-top:.25rem}
.section-heading{
  display:flex; align-items:center; gap:.6rem; font-size:1.3rem; font-weight:700; margin-bottom:.9rem;
  padding-bottom:.5rem; border-bottom:1px solid var(--color-divider);
}
.section-heading .num{
  display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:var(--radius-full);
  background:var(--color-primary); color:var(--color-text-inverse); font-family:var(--font-body); font-size:.75rem; font-weight:700; flex-shrink:0;
}
.card{
  background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg);
  padding:1rem 1.2rem; margin-bottom:.85rem; box-shadow:var(--shadow-sm);
}
.card-title{font-weight:700; font-size:.95rem; margin-bottom:.5rem; color:var(--color-text); font-family:var(--font-body); display:flex; align-items:center; gap:.4rem}
.card-title svg{width:16px;height:16px;flex-shrink:0;color:var(--color-primary)}
.card ul{padding-left:0}
.card li{
  position:relative; padding-left:1.1rem; margin-bottom:.5rem; font-size:.93rem; color:var(--color-text); line-height:1.55;
}
.card li:last-child{margin-bottom:0}
.card li::before{content:"";position:absolute;left:0;top:.55em;width:5px;height:5px;border-radius:50%;background:var(--color-primary)}

.accordion{border:1px solid var(--color-border); border-radius:var(--radius-lg); margin-bottom:.7rem; overflow:hidden; background:var(--color-surface)}
.accordion-head{
  width:100%; display:flex; align-items:center; justify-content:space-between; padding:.85rem 1.1rem;
  font-weight:600; font-size:.98rem;
}
.accordion-head:hover{background:var(--color-surface-offset)}
.accordion-head svg{width:17px;height:17px; transition:transform .2s cubic-bezier(.16,1,.3,1); color:var(--color-text-muted); flex-shrink:0}
.accordion.open .accordion-head svg{transform:rotate(180deg)}
.accordion-body{max-height:0; overflow:hidden; transition:max-height .25s cubic-bezier(.16,1,.3,1)}
.accordion-body-inner{padding:0 1.1rem 1.1rem}

.callout{
  border-radius:var(--radius-lg); padding:1rem 1.2rem; margin-bottom:1rem; display:flex; gap:.7rem;
}
.callout svg{width:20px;height:20px;flex-shrink:0; margin-top:.1rem}
.callout-title{font-weight:700; margin-bottom:.3rem; font-size:.92rem}
.callout p, .callout li{font-size:.9rem}
.callout.red{background:var(--color-error-highlight); color:var(--color-error)}
.callout.red .callout-title,.callout.red svg{color:var(--color-error)}
.callout.yellow{background:var(--color-gold-highlight); color:var(--color-warning)}
.callout.yellow .callout-title,.callout.yellow svg{color:var(--color-warning)}
.callout.blue{background:var(--color-blue-highlight)}
.callout.blue .callout-title,.callout.blue svg{color:var(--color-blue)}
.callout.green{background:var(--color-success-highlight)}
.callout.green .callout-title,.callout.green svg{color:var(--color-success)}
.callout p, .callout li{color:var(--color-text)}

.pill{
  display:inline-flex; align-items:center; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.03em;
  padding:.25rem .6rem; border-radius:var(--radius-full); background:var(--color-primary-highlight); color:var(--color-primary-active);
  margin-bottom:.5rem;
}
.grid-2{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:.85rem}

.joint-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:.85rem; margin-top:1.5rem}
.joint-tile{
  background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg); padding:1.1rem;
  text-align:left; box-shadow:var(--shadow-sm); transition:box-shadow .2s, transform .2s cubic-bezier(.16,1,.3,1);
}
.joint-tile:hover{box-shadow:var(--shadow-md); transform:translateY(-2px)}
.joint-tile svg{width:26px;height:26px;color:var(--color-primary); margin-bottom:.6rem}
.joint-tile-title{font-weight:600; font-size:.95rem}
.joint-tile-sub{font-size:.78rem; color:var(--color-text-muted); margin-top:.2rem}

.flow{display:flex; flex-direction:column; gap:0; margin:1rem 0}
.flow-step{
  display:flex; align-items:flex-start; gap:.8rem; padding:.9rem 0; position:relative;
}
.flow-step:not(:last-child)::after{
  content:""; position:absolute; left:16px; top:44px; bottom:-4px; width:2px; background:var(--color-divider);
}
.flow-dot{
  width:33px;height:33px;border-radius:50%; background:var(--color-primary); color:var(--color-text-inverse);
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.8rem; flex-shrink:0; z-index:1;
}
.flow-content b{display:block; font-size:.92rem; margin-bottom:.1rem}
.flow-content span{font-size:.85rem; color:var(--color-text-muted)}

.table-wrap{overflow-x:auto; border:1px solid var(--color-border); border-radius:var(--radius-lg); margin-bottom:1rem}
table.clin{font-size:.87rem}
table.clin th{text-align:left; background:var(--color-surface-offset); padding:.6rem .8rem; font-weight:600; white-space:nowrap; border-bottom:1px solid var(--color-border)}
table.clin td{padding:.6rem .8rem; border-bottom:1px solid var(--color-divider); vertical-align:top}
table.clin tr:last-child td{border-bottom:none}

.toc-chip{
  display:inline-flex; align-items:center; gap:.4rem; padding:.4rem .75rem; border-radius:var(--radius-full);
  background:var(--color-surface-offset); font-size:.82rem; font-weight:500; margin:.2rem .3rem .2rem 0; border:1px solid var(--color-border);
}
.toc-chip:hover{background:var(--color-primary-highlight); color:var(--color-primary-active)}

.search-empty{padding:2.5rem 1rem; text-align:center; color:var(--color-text-muted)}
.hidden{display:none !important}
mark{background:var(--color-gold-highlight); color:var(--color-text); border-radius:2px; padding:0 .1em}

.hero-banner{
  background:linear-gradient(135deg, color-mix(in oklab, var(--color-primary) 12%, var(--color-surface)), var(--color-surface));
  border:1px solid var(--color-border); border-radius:var(--radius-xl); padding:2rem 1.6rem; margin-bottom:2rem;
}
.hero-banner h1{font-size:clamp(1.7rem,1.3rem+1.4vw,2.3rem); margin-bottom:.6rem}
.hero-banner p{color:var(--color-text-muted); max-width:65ch; font-size:.98rem; margin-bottom:1rem}
.hero-stats{display:flex; gap:1.5rem; flex-wrap:wrap; margin-top:1rem}
.hero-stat b{font-size:1.4rem; display:block; color:var(--color-primary); font-family:var(--font-display)}
.hero-stat span{font-size:.78rem; color:var(--color-text-muted); text-transform:uppercase; letter-spacing:.03em}
@media(hover:none){.joint-tile:hover{transform:none}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3v6a3 3 0 0 0 3 3h1"/><path d="M18 21v-6a3 3 0 0 0-3-3h-1"/><path d="M9 12h6"/><circle cx="6" cy="4.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="18" cy="19.5" r="1.5" fill="currentColor" stroke="none"/></svg>
      <div class="brand-text">MSK Guide<span>Assessment Manual</span></div>
    </div>
    <div class="nav-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search assessment, tests, flags…" autocomplete="off">
    </div>
    <nav id="navTree"></nav>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="icon-btn" id="sidebarToggle" aria-label="Toggle navigation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="spacer"></div>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
    <main class="content" id="content"></main>
  </div>
</div>

<script>
const MSK_DATA = {"intro": {"principles": ["MSK assessment is a structured clinical reasoning process, not a checklist \u2014 each question and test should test a hypothesis generated from the story so far.", "The process moves from broad (screening for serious pathology, understanding the person's context) to specific (regional structures, movement impairments).", "Assessment and treatment are iterative: reassessment after each intervention (e.g. repeated movements, mobilisation) is itself diagnostic.", "Clinicians should always assess relevant structures above and below the symptomatic area (e.g. hip/lumbar spine for knee pain) to rule in/out referred sources.", "Consistent structure (Subjective \u2192 Objective \u2192 Analysis \u2192 Plan) improves safety, reduces missed pathology, and supports clear communication with the MDT."], "clinical_reasoning": ["Hypothesis-oriented approach: generate multiple hypotheses early (mechanical, inflammatory, neuropathic, referred, serious pathology) and test/refute them through the interview and exam.", "Pattern recognition develops with experience but must always be checked against red flags and atypical presentations.", "Use SIN(SS) \u2014 Severity, Irritability, Nature, Stage, Stability \u2014 to guide how vigorously you examine and load the tissue on the day.", "Diagnostic triage sorts patients into: serious pathology, specific pathology, nerve root involvement, or non-specific mechanical pain (most common).", "Continually ask 'does this fit?' \u2014 if objective findings don't match the subjective story, revisit your hypotheses."], "red_flags": ["Cancer history, unexplained weight loss, night sweats, fever \u2014 possible malignancy or infection.", "Trauma with severe pain / suspected fracture, especially in osteoporotic or elderly patients or on long-term steroids.", "Progressive neurological deficit, cauda equina signs (saddle anaesthesia, bilateral leg symptoms, bladder/bowel dysfunction) \u2014 surgical emergency.", "Unremitting night pain not relieved by rest or position change.", "Systemic inflammatory signs \u2014 multiple joint involvement, morning stiffness >30-60 min, extra-articular symptoms.", "Vascular signs \u2014 pulseless limb, cold/pale extremity, DVT signs, compartment syndrome signs.", "Cervical arterial dysfunction \u2014 5 Ds and 3 Ns: Dizziness, Diplopia, Dysarthria, Dysphagia, Drop attacks, Nausea, Numbness, Nystagmus.", "Upper cervical ligamentous instability history (RA, Down syndrome, recent trauma) before manual therapy."], "yellow_flags": ["Beliefs that pain and activity are harmful ('hurt equals harm'), leading to fear-avoidance.", "Low mood, anxiety, or catastrophic thinking about pain and prognosis.", "Passive coping strategies \u2014 expecting passive treatments rather than active self-management.", "Social/occupational factors \u2014 low job satisfaction, conflict with employer, financial stress, poor support.", "Compensation or litigation claims influencing recovery expectations.", "Previous negative healthcare experiences or unhelpful diagnostic labels."], "biopsychosocial": ["Biological: tissue pathology, nociception, structural change, comorbidities, genetics.", "Psychological: beliefs, emotions, coping strategies, self-efficacy, catastrophising, fear-avoidance.", "Social: work, family, culture, finances, healthcare access, support network.", "Pain/disability arise from interaction of all three domains \u2014 treating tissue alone is often insufficient for persistent pain.", "Screening tools (STarT Back, PCS, TSK) identify psychosocial risk early and guide stratified care."], "evidence_based": ["Combine best research evidence, clinical expertise, and patient values/preferences (Sackett's model).", "Use validated outcome measures to track change objectively.", "Critically appraise special tests \u2014 use clusters, not single tests, alongside reasoning.", "Stay current with guidelines (NICE LBP, NICE OA) favouring active management over passive modalities."], "soap": ["S \u2013 Subjective: patient's own account, symptoms, history, function, goals.", "O \u2013 Objective: measurable, reproducible clinical findings.", "A \u2013 Assessment: clinical impression, diagnosis, problem list, reasoning linking S and O.", "P \u2013 Plan: treatment plan, goals, review date, referral, self-management advice.", "SOAP structure supports clear, auditable, legally defensible documentation (CSP standards)."], "icf": ["Health Condition sits centrally, influencing and influenced by the other domains.", "Body Function/Structure \u2014 impairments (reduced ROM, weakness, pain).", "Activity \u2014 task-level limitations (walking, lifting, dressing).", "Participation \u2014 restrictions in life roles (work, sport, family care).", "Environmental/Personal Factors \u2014 context that facilitates or hinders recovery.", "Ensures assessment and goal-setting address the whole person, not just pathology."], "patient_centred": ["Shared decision-making: presenting options, involving patients in treatment choice.", "Eliciting the patient's own goals early and revisiting them throughout care.", "Plain, jargon-free language and 'teach-back' to check understanding.", "Respecting cultural, personal and health-literacy differences.", "Therapeutic alliance independently influences outcomes in MSK conditions."], "general_process_steps": {"Patient demographics": ["Name, age, occupation, hand/foot dominance, activity level."], "Presenting complaint": ["Patient's own words for the primary problem, in order of importance."], "History of presenting condition": ["Onset, duration, course, prior episodes, previous treatment/response."], "Mechanism of injury": ["Forces involved (direction, speed, joint position) \u2014 critical for structural hypotheses."], "Pain assessment": ["Location (body chart), quality, intensity (0-10 NRS), depth, radiation, pattern."], "24-hour behaviour": ["Morning stiffness duration, day pattern, night pain, rest vs activity effect."], "Functional limitations": ["Sitting/standing tolerance, walking distance, stairs, lifting, self-care, sleep."], "Aggravating and easing factors": ["Movements/postures/loads that worsen or ease symptoms."], "Past medical history": ["Comorbidities, medications, allergies."], "Past surgical history": ["Previous surgeries, complications, hardware in situ."], "Medication review": ["Analgesics, NSAIDs, steroids (fracture risk), anticoagulants (bleeding risk)."], "Imaging review": ["Prior imaging, findings, correlation with symptoms."], "Occupational history": ["Job demands, manual handling, sustained postures."], "Sporting history": ["Level/frequency, training load changes, technique, return-to-sport goals."], "Psychosocial screening": ["Yellow flags, mood, stress, pain beliefs."], "Red flag screening": ["Systematic screen relevant to region before physical loading."], "Yellow flag screening": ["Psychosocial risk factors predicting delayed recovery."], "Goals of treatment": ["Patient-defined, specific, measurable short/long-term functional goals."]}}, "joints": {"Cervical Spine": {"anatomy": {"Bones": "7 cervical vertebrae (C1 atlas, C2 axis unique; C3-C7 typical); ~50% of cervical rotation occurs at C1/C2.", "Joints": "Atlanto-occipital, atlanto-axial, zygapophyseal (facet) C2-C7, uncovertebral (Luschka) joints C3-C7.", "Ligaments": "Anterior/posterior longitudinal, ligamentum flavum, alar and transverse ligaments (C1/C2 stability), interspinous/nuchal ligament.", "Capsule": "Facet joint capsules \u2014 richly innervated, common pain generator in whiplash/mechanical neck pain.", "Muscles": "Deep flexors (longus colli/capitis), deep extensors (multifidus, semispinalis), SCM, scalenes, upper trapezius, levator scapulae, suboccipitals.", "Tendons": "No discrete tendons of major concern; SCM/scalene units relevant to TOS/referred symptoms.", "Bursae": "Not clinically significant.", "Blood supply": "Vertebral arteries pass through transverse foramina C6-C1 \u2014 relevant ical decision making": "Spurling's + distraction + ULNT + rotation <60\u00b0 cluster raises likelihood of radiculopathy; myelopathy signs need urgent referral.", "Referral criteria": "Progressive neuro deficit, suspected myelopathy, CAD red flags, failure to progress after 4-6 weeks.", "When imaging is indicated": "Red flags, progressive deficit, failed conservative care, post-trauma (Canadian C-Spine Rules)."}, "treatment": {"Short-term goals": "Reduce pain/guarding, restore functional ROM, improve deep flexor activation.", "Long-term goals": "Return to full work/sport, prevent recurrence.", "Patient education": "Reassurance, whiplash early-activity education, pain-science education.", "Pain management": "Short-term analgesia, heat, gentle active movement \u2014 avoid prolonged rest/collar.", "Manual therapy": "Cervical/thoracic mobilisation combined with exercise.", "Soft tissue techniques": "Trigger point release upper trap/levator scapulae/suboccipitals.", "Joint mobilisations": "Graded PA mobilisations based on irritability.", "Exercise prescription": "Deep flexor/extensor strengthening, scapular stabilisation, postural exercises.", "Strengthening": "Progressive craniocervical flexion, isometric-to-isotonic neck strengthening.", "Stretching": "Upper trap, levator scapulae, pec stretches.", "Motor control": "Deep flexor/extensor co-activation, scapular positioning during arm tasks.", "Balance training": "Cervical proprioception/joint position error retraining post-whiplash.", "Functional rehabilitation": "Driving checks, overhead work, sustained postures.", "Sport-specific rehabilitation": "Neck strengthening for contact sports, graded return.", "Return-to-work criteria": "Pain-free/functional ROM for job demands.", "Return-to-sport criteria": "Full ROM/strength, sport-specific neck strength, medical clearance.", "Home exercise programme": "Daily craniocervical flexion, postural stretches, pacing advice.", "Progression criteria": "Symptom reduction, ROM improvem
